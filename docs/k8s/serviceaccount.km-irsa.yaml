# Replace <klanker-account-id> with the AWS account where you ran `km cluster add`
# (the role's account — your klanker install, NOT the EKS cluster's account).
# Replace <cluster-name> with the --name you passed to `km cluster add`.
# Replace <resource-prefix> with the resource_prefix from your km-config.yaml (default: km).
#
# kubectl apply -f serviceaccount.km-irsa.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: km
  namespace: security
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/km-cluster-dev-use1-0
    eks.amazonaws.com/token-expiration: "3600"
