# Smoke test: run `km list` inside an EKS pod via cross-account IRSA.
#
# Replace these placeholders before applying:
#   123456789012             → your klanker AWS account id (NOT the EKS cluster's account)
#   km-cluster-dev-use1-0    → <resource_prefix>-cluster-<--name from km cluster add>
#   km-artifacts-EXAMPLE123  → artifacts_bucket from your km-config.yaml
#
# Apply:
#   kubectl apply -f km-list.test.yaml
# Watch:
#   kubectl -n security logs km-list-test -c km
# Cleanup:
#   kubectl delete -f km-list.test.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: km
  namespace: security
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/km-cluster-dev-use1-0
    eks.amazonaws.com/token-expiration: "3600"
---
apiVersion: v1
kind: Pod
metadata:
  name: km-list-test
  namespace: security
spec:
  serviceAccountName: km
  restartPolicy: Never
  initContainers:
  - name: fetch-km
    image: amazon/aws-cli
    command: ["sh", "-c", "aws s3 cp s3://$KM_ARTIFACTS_BUCKET/sidecars/km /km/km && chmod +x /km/km"]
    env:
    - name: KM_ARTIFACTS_BUCKET
      value: "km-artifacts-EXAMPLE123"
    - name: KM_ACCOUNT_ID
      value: "123456789012"
    volumeMounts:
    - name: km-bin
      mountPath: /km
  containers:
  - name: km
    image: alpine
    command: ["sh", "-c", "mkdir -p /root/.aws && printf '[profile klanker-terraform]\\nregion = us-east-1\\nrole_arn = arn:aws:iam::'$KM_ACCOUNT_ID':role/km-cluster-dev-use1-0\\nweb_identity_token_file = /var/run/secrets/eks.amazonaws.com/serviceaccount/token\\n' > /root/.aws/config && /km/km list"]
    env:
    - name: KM_AWS_PROFILE
      value: ""
    - name: KM_CONFIG_PATH
      value: /config/km-config.yaml
    volumeMounts:
    - name: km-bin
      mountPath: /km
    - name: km-config
      mountPath: /config
  volumes:
  - name: km-bin
    emptyDir: {}
  - name: km-config
    configMap:
      name: km-config
