# km-config.yaml — platform configuration for the km CLI
#
# Copy this file to km-config.yaml and fill in your values.
# Add km-config.yaml to .gitignore (it contains account IDs and secrets).
#
# Run `km configure` for an interactive setup wizard, or edit this file directly.
#
# Minimum required values are marked [REQUIRED]. Everything else has sensible
# defaults or is auto-discovered by `km init`.

# =============================================================================
# REQUIRED — you must set these before running km init
# =============================================================================

# Base domain for the platform. Sandboxes get emails at sandboxes.{domain}.
domain: example.com                          # [REQUIRED]

# AWS region for infrastructure.
region: us-east-1                            # [REQUIRED]

# AWS account IDs (Phase 65 four-account topology).
#
# Single-account install? Set application/terraform/dns_parent to the same ID
# and leave organization blank — `km bootstrap` skips SCP deployment.
accounts:
  organization: "111111111111"               # [OPTIONAL] AWS Organizations management account (SCP target). Leave blank to skip SCP.
  dns_parent:  "111111111111"                # [REQUIRED if domain set] account owning the Route53 parent zone for `domain`
  terraform:   "222222222222"                # [REQUIRED] infra account (state, Lambdas)
  application: "222222222222"                # [REQUIRED] where sandboxes run (can be same as terraform)

# AWS SSO portal for credential refresh.
sso:
  start_url: https://your-org.awsapps.com/start  # [REQUIRED]
  region: us-east-1

# Operator email — receives TTL expiry, idle, budget, and error notifications.
operator_email: you@example.com              # [REQUIRED]

# Shared secret for email-to-create authentication (KM-AUTH header).
safe_phrase: change-me-to-something-unique   # [REQUIRED]

# =============================================================================
# OPTIONAL — defaults work for most setups
# =============================================================================

# AWS CLI profile name (default: klanker-terraform)
# aws_profile: klanker-terraform

# Max concurrent sandboxes (0 = unlimited, default: 10)
# max_sandboxes: 10

# Prefix for all account-globally-unique AWS resource names (DDB tables,
# Lambdas, IAM roles, SSM paths, etc.). Default: "km".
# Change only when running a second km install in the same AWS account
# (e.g. "kmdev") to avoid collisions. One-time choice — changing later
# orphans existing resources.
# resource_prefix: km

# Subdomain under `domain` used for sandbox SES email addresses
# (sb-xxxxxxxx@{email_subdomain}.{domain}). Default: "sandboxes".
# One-time choice — changing requires fresh SES domain identity
# verification (DKIM, MX records).
# email_subdomain: sandboxes

# Build and push the km-sandbox + sidecar container images to ECR during
# `km init`. Container images are only pulled by the `docker` and `ecs`
# substrates; EC2 sandboxes get raw binaries from S3, so EC2-only
# deployments can set this to false and save ~2–10 min per `km init`.
# Default: true (preserves current behavior). Setting to false will cause
# `km create --docker` (or any profile with substrate: docker/ecs) to fail
# fast with a clear error pointing back at this knob.
# container_substrates_enabled: true

# =============================================================================
# SLACK BRIDGE — install-level defaults (all OPTIONAL, dormant unless set)
# =============================================================================
#
# These keys flow into the slack-bridge Lambda's environment block at
# `km init --dry-run=false` time (a full terragrunt apply — NOT `km init
# --sidecars`, which rebuilds binaries but leaves the env block untouched).
# Bootstrapping Slack itself (token, signing secret, channel) is done with
# `km slack init`, not here. See docs/slack-notifications.md.
#
# slack:
#   # Polite-bot mode (Phase 91). When true, the bridge only acts on messages
#   # that @-mention the bot in shared channels. Per-sandbox #sb-{id} channels
#   # are unaffected. Omit the key for the chatty default (false).
#   mention_only: true
#
#   # First-only reactor (Phase 91.4). When false, the bridge posts the 👀
#   # reaction only on top-level engagement messages; thread replies dispatch
#   # silently. Omit for the default (true = react on every dispatch).
#   react_always: false
#
#   # Federated relay (Phase 95). One Slack App serving multiple km installs.
#   # List the OTHER installs' bridge /events URLs here; Slack delivers all
#   # events to this "front-door" install, which relays unknown-channel events
#   # to the peers until the owning install processes them. Get a peer's URL
#   # from `km slack status` on that install. Empty/absent → federation off.
#   peer_bridges:
#     - https://aaaaaaaaaaaaaaaaaaaaaaaaaa.lambda-url.us-east-1.on.aws/events
#     - https://bbbbbbbbbbbbbbbbbbbbbbbbbb.lambda-url.us-east-1.on.aws/events
#
#   # Default router (Phase 96). Set true on the FRONT-DOOR install only. When
#   # the bot is @-mentioned in a channel no install owns, the front door posts
#   # one threaded reply naming the #sb-{alias}-{profile} convention and listing
#   # running sandbox channels across the fleet. Absent/false → no reply.
#   default_router: true

# =============================================================================
# GITHUB BRIDGE — comment-trigger bridge (all OPTIONAL, dormant unless set)
# =============================================================================
#
# When an allowlisted GitHub login @-mentions the bot in a PR/issue comment,
# the github-bridge Lambda resolves owner/repo → a sandbox and dispatches an
# agent turn that posts back a PR review/comment. Absent `github:` block →
# byte-identical to a bridge-less install. Register the GitHub App with
# `km github manifest` / `km github init`; these keys configure routing only.
# Deploy with `km init --dry-run=false` (NOT `--sidecars`). See docs/github-bridge.md.
#
# github:
#   # Fallback SandboxProfile used when a matched repo entry has no `profile:`.
#   default_profile: profiles/github-review.yaml
#
#   # Fallback command key (must be a key under `commands:`) dispatched when a
#   # comment carries no @verb and the matched repo has no `default_command:`.
#   default_command: review
#
#   # Repo → sandbox routing. `match` is "owner/repo" (Phase 97; `owner/*`
#   # wildcard supported). Each entry may override alias/profile/default_command
#   # and add a supplemental network allowlist. Profile falls back to
#   # default_profile above when omitted.
#   repos:
#     - match: example-org/*          # all repos under example-org
#       alias: github-bot
#       profile: profiles/github-review.yaml
#       allow:                        # extra network allowlist (login/host entries)
#         - example-org
#     - match: example-org/payments   # a more specific override wins
#       alias: payments-review
#       profile: profiles/github-review.yaml
#       default_command: triage
#
#   # Named, operator-declared commands (Phase 99). The verb after the @-mention
#   # (e.g. "@bot review") selects the entry; `prompt` is the initial turn and
#   # may be inline text or @file (resolved relative to the repo root). `help`,
#   # `claude`, and `codex` are RESERVED (Phase 102) — defining them here trips
#   # a `km doctor` WARN.
#   commands:
#     review:
#       description: Review or triage the PR/issue (default when no command is given)
#       prompt: '@profiles/default.github.prompt.txt'
#     triage:
#       description: Label and summarize a new issue
#       alias: payments-review        # optional: route this command to a dedicated sandbox
#       prompt: |
#         Triage this issue: assign labels, summarize the request, and suggest next steps.
#
#   # Federated relay (Phase 100). One GitHub App serving multiple km installs.
#   # List the OTHER installs' github-bridge Function URLs (`km github status` →
#   # bridge-url). GitHub delivers every webhook to this front-door install,
#   # which relays repos it doesn't own to the peers. Empty/absent → off.
#   peer_bridges:
#     - https://cccccccccccccccccccccccccc.lambda-url.us-east-1.on.aws/
#     - https://dddddddddddddddddddddddddd.lambda-url.us-east-1.on.aws/
#
#   # Orphan-repo router (Phase 101). Set true on the FRONT-DOOR install only.
#   # When the bot is @-mentioned on a repo no install owns, the front door
#   # posts one guidance comment naming `github.repos:` wiring + `km init`.
#   # Absent/false → the event is silently dropped (Phase 100 behavior).
#   default_router: true

# =============================================================================
# AUTO-POPULATED by km init — uncomment to override
# =============================================================================

# S3 bucket for Terraform state and sandbox metadata.
# Default: tf-km-state-{region-label}  (created by km init)
# state_bucket: tf-km-state-use1

# S3 bucket for Lambda zips, sidecar binaries, and sandbox profiles/artifacts.
# Auto-derived by `km configure` as ${resource_prefix}-artifacts-${account_id}.
# artifacts_bucket: "<prefix>-artifacts-<account-id>"

# DynamoDB table names (created by km init).
# budget_table_name: km-budgets
# sandbox_table_name: km-sandboxes
# identity_table_name: km-identities
# schedules_table_name: km-schedules

# Route53 hosted zone ID for sandboxes.{domain} (created by km init).
# route53_zone_id: Z0123456789ABCDEFGHIJ

# Lambda ARNs (deployed by km init).
# ttl_lambda_arn: arn:aws:lambda:us-east-1:222222222222:function:km-ttl-handler
# create_handler_lambda_arn: arn:aws:lambda:us-east-1:222222222222:function:km-create-handler
# scheduler_role_arn: arn:aws:iam::222222222222:role/km-ttl-scheduler
