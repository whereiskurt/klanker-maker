apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: ecs-empty-repos-test
  labels:
    tier: test

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "1h"
    teardownPolicy: destroy

  runtime:
    substrate: ecs
    spot: true
    instanceType: "512/1024"
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos: []
      allowedRefs:
        - "main"

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - ".github.com"
      allowedHosts:
        - "api.github.com"

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: false
      image: ""
    httpProxy:
      enabled: false
      image: ""
    auditLog:
      enabled: false
      image: ""
    tracing:
      enabled: false
      image: ""

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network

  agent:
    maxConcurrentTasks: 2
    taskTimeout: "15m"
