apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: ec2-with-allowed-refs-test
  labels:
    tier: test

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "1h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "github.com/myorg/myrepo"
      allowedRefs:
        - "main"
        - "feature/*"
      permissions:
        - read

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - ".github.com"
      allowedHosts:
        - "api.github.com"
      allowedMethods:
        - GET

  identity:
    roleSessionDuration: "2h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal
    allowedSecretPaths:
      - "/km/sandboxes/my-sandbox/api-key"

  sidecars:
    dnsProxy:
      enabled: false
      image: ""
    httpProxy:
      enabled: false
      image: ""
    auditLog:
      enabled: false
      image: ""
    tracing:
      enabled: false
      image: ""

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network

  policy:
    allowShellEscape: false

  agent:
    maxConcurrentTasks: 2
    taskTimeout: "15m"
