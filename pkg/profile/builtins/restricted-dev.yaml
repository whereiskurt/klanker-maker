apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: restricted-dev
  labels:
    tier: development
    builtin: "true"

spec:
  lifecycle:
    ttl: "8h"
    idleTimeout: "2h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace
    env:
      SANDBOX_MODE: restricted-dev

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "github.com/whereiskurt/*"
      allowedRefs:
        - "main"
        - "develop"
      permissions:
        - read

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - ".github.com"
        - ".githubusercontent.com"
        - ".npmjs.org"
        - ".pypi.org"
        - ".golang.org"
      allowedHosts:
        - "api.github.com"
        - "registry.npmjs.org"
        - "pypi.org"
        - "pkg.go.dev"
        - "sum.golang.org"
      allowedMethods:
        - GET
        - POST

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network

  policy:
    allowShellEscape: false
    allowedCommands:
      - git
      - python3
      - pip
      - node
      - npm
      - go
    filesystemPolicy:
      readOnlyPaths:
        - /etc
      writablePaths:
        - /workspace
        - /tmp

  agent:
    maxConcurrentTasks: 2
    taskTimeout: "20m"
    allowedTools:
      - bash
      - read_file
      - write_file
