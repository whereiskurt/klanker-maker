apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: base-gpu-serve
  abstract: true
  # Phase 122: Abstract GPU-serving fragment.
  # Provides: vLLM docker-run systemd unit + Bifrost multi-provider gateway (:8001)
  # + Continue config + codex local-provider knob + raised compute budget.
  # LiteLLM = documented fallback if Bifrost hits a wall in UAT (see 122-RESEARCH.md O9).
  # Leaves must set: spec.runtime.instanceType, /etc/km/vllm.env via initCommandsAppend.

spec:
  # BOOL ZERO-VALUE TRAP (Phase 117 Pitfall 2):
  # spec.runtime here carries ONLY ami, substrate, additionalVolume.
  # spot/hibernation/mountEFS MUST stay in the leaf (pointer-bool gap).
  runtime:
    ami: ami-0a9d213b92dabc044   # DLAMI Ubuntu 24.04 (2026-06-26); re-resolve monthly:
    # aws ec2 describe-images --owners amazon \
    #   --filters "Name=name,Values=Deep Learning Base OSS Nvidia Driver GPU AMI (Ubuntu 24.04)*" \
    #             "Name=state,Values=available" \
    #   --query "sort_by(Images, &CreationDate)[-1].ImageId" \
    #   --region us-east-1 --output text
    substrate: ec2
    additionalVolume:
      size: 300
      mountPoint: /data

  lifecycle:
    ttl: "8h"
    idleTimeout: "1h"
    teardownPolicy: stop

  budget:
    compute:
      maxSpendUSD: 120   # 12x floor; 48x leaves override to 300
    ai:
      maxSpendUSD: 2.00

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false

    env:
      HF_HOME: /data/hf
      OPENAI_API_KEY: ""   # dummy key; Bifrost/vLLM accept keyless requests on loopback
      # NOTE: OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 is exported by
      # base/userinit (confirmed in profiles/base/userinit.yaml initCommands:
      # /etc/profile.d/km-zz-goose-otel.sh) — NOT duplicated here.

    # initCommandsAppend UNIONS onto the leaf's commands (Phase 117).
    # Leaves MUST write /etc/km/vllm.env before these run (via initCommandsAppend).
    # Bifrost ships as a DOCKER IMAGE (maximhq/bifrost:v1.6.0) — there is NO release
    # binary (the old curl URL 404s). Config is read from a mounted app-dir as
    # config.json; port via APP_PORT env. Validated live in 122-BIFROST-VALIDATION.md.
    initCommandsAppend:
      - "docker pull maximhq/bifrost:v1.6.0"
      - "mkdir -p /etc/km/bifrost-data && cp /etc/km/bifrost-config.json /etc/km/bifrost-data/config.json"
      # /etc/km/bifrost-env = container --env-file; create it (empty = keyless Bedrock
      # only) + pull any SOPS-injected keys for the anthropic/openai-direct routes.
      - "touch /etc/km/bifrost-env && grep -hE '^(ANTHROPIC_API_KEY|OPENAI_API_KEY)=' /etc/sandbox-secrets.env >> /etc/km/bifrost-env 2>/dev/null || true"
      - "systemctl daemon-reload"
      - "systemctl enable --now vllm.service"
      - "systemctl enable --now bifrost.service"

    configFiles:
      # vLLM systemd unit — docker-run wrapper, reads /etc/km/vllm.env from leaf.
      # --ipc=host required for multi-GPU CUDA shared memory (tensor-parallel).
      # ExecStartPre=/bin/sleep 5 mitigates DLAMI+systemd cgroup GPU-loss race (Pitfall 3).
      "/etc/systemd/system/vllm.service": |
        [Unit]
        Description=vLLM serving (GPU sandbox, local model)
        After=docker.service network.target
        Wants=docker.service

        [Service]
        Type=simple
        EnvironmentFile=-/etc/km/vllm.env
        ExecStartPre=/bin/sleep 5
        ExecStart=docker run --rm --gpus all --ipc=host \
          -p 127.0.0.1:8000:8000 \
          -v /data/hf:/root/.cache/huggingface \
          --env-file /etc/km/vllm.env \
          vllm/vllm-openai:latest \
          --model ${VLLM_MODEL} \
          --tensor-parallel-size ${VLLM_TP} \
          --served-model-name local \
          ${VLLM_EXTRA}
        Restart=on-failure
        RestartSec=30

        [Install]
        WantedBy=multi-user.target

      # Bifrost gateway systemd unit — DOCKER-RUN (maximhq/bifrost:v1.6.0) on :8001.
      # --network host so Bifrost binds 127.0.0.1:8001, reaches vLLM at :8000, and
      # resolves the EC2 INSTANCE ROLE via IMDS (SigV4 Bedrock — NO AWS_* env vars).
      # config.json is the mounted app-dir; APP_PORT sets the port (default 8080).
      # OTLP export is env-driven (telemetry plugin active by default). Validated:
      # 122-BIFROST-VALIDATION.md.
      "/etc/systemd/system/bifrost.service": |
        [Unit]
        Description=Bifrost multi-provider model router (vLLM + Bedrock + Anthropic)
        After=docker.service vllm.service network-online.target
        Wants=docker.service vllm.service network-online.target

        [Service]
        Type=simple
        ExecStartPre=/bin/sleep 10
        ExecStartPre=-/usr/bin/docker rm -f km-bifrost
        ExecStart=/usr/bin/docker run --rm --name km-bifrost \
          --network host \
          -e APP_PORT=8001 \
          -e APP_HOST=127.0.0.1 \
          -e AWS_REGION=us-east-1 \
          -e OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 \
          -e OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf \
          --env-file /etc/km/bifrost-env \
          -v /etc/km/bifrost-data:/app/data \
          maximhq/bifrost:v1.6.0
        ExecStop=/usr/bin/docker rm -f km-bifrost
        Restart=on-failure
        RestartSec=15

        [Install]
        WantedBy=multi-user.target

      # Bifrost provider config (JSON) — REAL maximhq/bifrost v1.6.x schema
      # (validated live against Bedrock: 122-BIFROST-VALIDATION.md). There is NO
      # named-route / telemetry / server / anthropic_ingress block — routing is
      # implicit: the caller sends model="<provider>/<model-id>". Bedrock = region-
      # only instance role (SigV4, no static key). Model-ID gotchas: gpt-oss DROPS
      # the -1:0 suffix (bedrock/openai.gpt-oss-120b — full ID 404s in Bifrost's
      # catalog); Claude needs the us. inference-profile prefix.
      # Callers pick the model string: vllm-local/local · bedrock/openai.gpt-oss-120b ·
      #   bedrock/us.anthropic.claude-sonnet-4-6 · anthropic/claude-sonnet-4-6 (key) ·
      #   openai/gpt-5 (key, dormant).
      # IAM NOTE (Plan 05 box-only UAT item): the sandbox instance role must grant
      # bedrock:InvokeModel(+WithResponseStream) for openai.gpt-oss-120b-1:0,
      # openai.gpt-oss-20b-1:0, and the us.anthropic.claude-* inference profiles.
      "/etc/km/bifrost-config.json": |
        {
          "config_store": {
            "enabled": false
          },
          "providers": {
            "bedrock": {
              "keys": [
                {
                  "name": "bedrock-iam",
                  "models": ["*"],
                  "weight": 1.0,
                  "bedrock_key_config": {
                    "region": "us-east-1"
                  }
                }
              ]
            },
            "anthropic": {
              "keys": [
                {
                  "name": "anthropic-direct",
                  "value": "env.ANTHROPIC_API_KEY",
                  "models": ["*"],
                  "weight": 1.0
                }
              ]
            },
            "openai": {
              "keys": [
                {
                  "name": "openai-frontier",
                  "value": "env.OPENAI_API_KEY",
                  "models": ["*"],
                  "weight": 1.0
                }
              ]
            },
            "vllm-local": {
              "keys": [
                {
                  "name": "vllm-key",
                  "value": "dummy",
                  "models": ["*"],
                  "weight": 1.0
                }
              ],
              "network_config": {
                "base_url": "http://127.0.0.1:8000",
                "default_request_timeout_in_seconds": 120
              },
              "custom_provider_config": {
                "base_provider_type": "openai",
                "allow_private_network": true,
                "allowed_requests": {
                  "chat_completion": true,
                  "chat_completion_stream": true,
                  "responses": true,
                  "responses_stream": true
                }
              }
            }
          }
        }

      # Continue editor config — points at local vLLM directly (chat-completions,
      # model name "local" as set by --served-model-name).
      "/home/sandbox/.continue/config.yaml": |
        models:
          - title: Local vLLM (local model)
            provider: openai
            model: local
            apiBase: http://localhost:8000/v1
            apiKey: dummy

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "*"
      allowedRefs:
        - "*"

  # NOTE: secrets for the gateway's key-gated routes (ANTHROPIC_API_KEY / OPENAI_API_KEY)
  # arrive via spec.secrets.sopsFile (KMS-decrypted to /etc/sandbox-secrets.env at boot;
  # the role already has kms:Decrypt on alias/km-sandbox-secrets), then the
  # initCommandsAppend copies them into /etc/km/bifrost-env. We deliberately do NOT use
  # iam.allowedSecretPaths (SSM-path injection) here — a bad/non-existent path makes the
  # boot's `aws ssm get-parameter` fail under `set -e` and BRICKS the boot (validated on
  # the CPU rehearsal). base/platform's iam block (roleSessionDuration, allowedRegions)
  # is inherited unchanged.

  # codex agent default: points at Bifrost :8001 (multi-provider gateway).
  # localBaseURL = :8001 (NOT :8000 directly) — Bifrost provides the Responses API
  # translation layer. vLLM also serves /v1/responses natively (bakeoff finding), but
  # Bifrost is preferred for uniform multi-provider access + Anthropic translation.
  agent:
    default: codex
    codex:
      # Bifrost OpenAI-compat ingress is /openai/v1 (bare /v1 404s); model carries
      # the provider prefix (vllm-local/<served-model-name>). Validated live
      # (122-BIFROST-VALIDATION.md): codex 0.23.0 hits /openai/v1/responses.
      localBaseURL: "http://localhost:8001/openai/v1"
      localModel: "vllm-local/local"
