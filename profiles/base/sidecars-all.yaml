apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: base-sidecars-all
  abstract: true

spec:
  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest
