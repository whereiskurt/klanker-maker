apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: base-agent-claude-all-tools
  abstract: true

spec:
  agent:
    claude:
      trustedDirectories:
        - /home/sandbox
        - /workspace
      tools:
        autoApprove:
          - Bash
          - Read
          - Write
          - Edit
          - Glob
          - Grep
          - WebFetch
          - WebSearch
          - NotebookEdit
      args:
        - "--dangerously-skip-permissions"
