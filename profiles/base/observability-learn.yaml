apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: base-observability-learn
  abstract: true

spec:
  observability:
    learnMode: true
    commandLog:
      destination: cloudwatch
      logGroup: /klanker-maker/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klanker-maker/network
    claudeTelemetry:
      enabled: true
      logPrompts: true
      logToolDetails: true
    tlsCapture:
      enabled: true
      libraries:
        - openssl
      capturePayloads: false
