apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: gpu-llama-12x
  labels:
    tier: gpu-serving
    model: llama3.3-70b-fp8
    instance: g6e.12xlarge

extends:
  - base/os/debian
  - base/network/safenetwork
  - base/userinit
  - base/platform
  - base/slack-persandbox
  - base/gpu/serve

spec:
  # Bool zero-value trap (Phase 117 Pitfall 2): mixed-bool runtime block in the LEAF.
  runtime:
    instanceType: g6e.12xlarge
    region: us-east-1
    spot: false
    hibernation: false

  # GATED: meta-llama/Llama-3.3-70B-Instruct requires HF_TOKEN (Meta license).
  # Operator encrypts HF_TOKEN with SOPS + shared KMS key (Phase 89):
  #   sops --encrypt --kms arn:aws:kms:us-east-1:052251888500:alias/km-sandbox-secrets \
  #        --input-type yaml --output-type yaml /tmp/llama-hf.yaml > secrets/llama-hf.enc.yaml
  # The real file is created at UAT (Plan 05). km validate checks suffix only (offline).
  secrets:
    sopsFile: ./secrets/llama-hf.enc.yaml

  iam:
    allowedSecretPaths:
      - /sandbox/*/secrets   # unions with fragment's entry; list-union dedupes

  execution:
    # Two initCommandsAppend lines:
    # 1. Write vllm.env with FP8 flags (llama3_json tool-call parser)
    # 2. Copy HF_TOKEN from SOPS-injected /etc/sandbox-secrets.env into vllm.env
    #    (SOPS decryption at userdata section 5.5 precedes initCommandsAppend; || true = no-fail if absent)
    # vllm.env must exist BEFORE base/gpu/serve's bring-up (initCommandsAppend),
    # so write it via initCommands (runs before all initCommandsAppend).
    initCommands:
      - "mkdir -p /etc/km && printf 'VLLM_MODEL=meta-llama/Llama-3.3-70B-Instruct\nVLLM_TP=4\nVLLM_EXTRA=--quantization fp8 --max-model-len 16384 --gpu-memory-utilization 0.90 --enable-auto-tool-choice --tool-call-parser llama3_json\n' > /etc/km/vllm.env"
      - "grep '^HF_TOKEN=' /etc/sandbox-secrets.env >> /etc/km/vllm.env 2>/dev/null || true"
