apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: goose-ebpf
  labels:
    tier: development
    tool: goose
  prefix: gebpf
  alias: gebpf

spec:
  lifecycle:
    ttl: "1h"
    idleTimeout: "15m"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: false
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: true
    env:
      SANDBOX_MODE: goose-ebpf
      GOOSE_PROVIDER: aws_bedrock
      GOOSE_MODEL: us.anthropic.claude-opus-4-6-v1
      GOOSE_MODE: auto
      GOOSE_TELEMETRY_ENABLED: "false"
      CODEX_CA_CERTIFICATE: /usr/local/share/ca-certificates/km-proxy-ca.crt
      OPENAI_API_KEY: ""
    rsyncPaths:
      - ".gitconfig"
      - ".config/goose"
      - ".claude"
      - ".claude.json"
    initCommands:
      - "yum install -y git nodejs npm python3 python3-pip bzip2 jq tar gzip unzip"
      - "HOME=/root curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | HOME=/root CONFIGURE=false bash"
      - "cp -r /root/.local/bin/goose /usr/local/bin/goose-bin || true"
      - "echo export OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf > /etc/profile.d/km-zz-goose-otel.sh"
      - "cat /usr/local/share/ca-certificates/km-proxy-ca.crt >> /etc/pki/tls/certs/ca-bundle.crt"
      - "echo export SSL_CERT_FILE=/etc/pki/tls/certs/ca-bundle.crt >> /etc/profile.d/km-zz-goose-otel.sh"
      - "mkdir -p /home/sandbox/.local/bin && cp /usr/local/bin/goose-bin /usr/local/bin/goose && cp /usr/local/bin/goose /home/sandbox/.local/bin/goose || true"
      - "npm install -g @anthropic-ai/claude-code"
      - "mkdir -p /home/sandbox/.config/goose"
      - "printf 'provider: aws_bedrock\\nmodel: us.anthropic.claude-opus-4-6-v1\\n' > /home/sandbox/.config/goose/config.yaml"
      - "mkdir -p /workspace && chown -R sandbox:sandbox /workspace /home/sandbox/.config /home/sandbox/.local"
      - "su - sandbox -c 'cd /workspace && git config --global user.name \"Goose eBPF Sandbox\" && git config --global user.email \"sandbox@klankermaker.ai\"'"

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "whereiskurt/meshtk"
        - "whereiskurt/defcon.run.34"
      allowedRefs:
        - "main"
        - "develop"
        - "feature/*"
        - "fix/*"

  network:
    # Pure eBPF enforcement — BPF connect4 in block mode, BPF DNS resolver,
    # no iptables DNAT, no proxy env vars. Proxy still runs for L7 inspection.
    enforcement: ebpf
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        # Anthropic / Claude Code
        - ".anthropic.com"
        - ".claude.ai"
        - ".claude.com"
        - ".sentry.io"
        - ".cloudfront.net"
        # GitHub (needed for git clone + API)
        - ".github.com"
        - ".githubusercontent.com"
        # npm / Node.js (for claude-code install)
        - ".npmjs.org"
        - ".npmjs.com"
        - ".nodejs.org"
        # Python (goose extensions via uvx)
        - ".pypi.org"
        - ".pythonhosted.org"
      allowedHosts:
        - "github.com"
        # Anthropic / Claude Code
        - "api.anthropic.com"
        - "statsig.anthropic.com"
        - "statsig.com"
        - "api.statsig.com"
        - "featuregates.org"
        - "api.featuregates.org"
        - "sentry.io"
        # npm
        - "registry.npmjs.org"
        - "nodejs.org"
        # Python
        - "pypi.org"
        - "files.pythonhosted.org"

  budget:
    compute:
      maxSpendUSD: 0.50
    ai:
      maxSpendUSD: 1.00
    warningThreshold: 0.80

  artifacts:
    paths:
      - /workspace
    maxSizeMB: 500

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network
    claudeTelemetry:
      enabled: true
      logPrompts: true
      logToolDetails: true
    tlsCapture:
      enabled: true
      libraries:
        - openssl
      capturePayloads: false

  email:
    signing: required
    verifyInbound: required
    encryption: off
    allowedSenders:
      - "self"

  agent:
    maxConcurrentTasks: 1
    taskTimeout: "30m"
    allowedTools:
      - bash
      - read_file
      - write_file
      - list_files
