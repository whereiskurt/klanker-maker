apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: sealed
  labels:
    tier: production
    security: sealed

spec:
  lifecycle:
    ttl: "60m"
    idleTimeout: "3m"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.micro
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist

  budget:
    compute:
      maxSpendUSD: 5.00
    ai:
      maxSpendUSD: 10.00
    warningThreshold: 0.80

  network:
    egress:
      allowedDNSSuffixes:
        - anthropic.com
        - npmjs.org
      allowedHosts:
        - api.anthropic.com
        - registry.npmjs.org
        - statsig.anthropic.com
      allowedMethods:
        - POST
        - GET

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network

  policy:
    allowShellEscape: false

  email:
    signing: required
    verifyInbound: required
    encryption: off
    allowedSenders:
      - "self"

  agent:
    maxConcurrentTasks: 1
    taskTimeout: "15m"
