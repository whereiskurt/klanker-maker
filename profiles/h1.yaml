apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: h1
  labels:
    tier: development
    tool: h1-triage-agent
  prefix: h1

extends:
  - base/os/redhat
  - base/userinit
  - base/platform
  - base/slack-persandbox

spec:
  lifecycle:
    ttl: "2h"
    idleTimeout: "20m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    instanceType: t3.medium
    region: us-east-1
    spot: false

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false

  sourceAccess:
    mode: none

  network:
    enforcement: proxy
    egress:
      allowedDNSSuffixes:
        - "api.hackerone.com"
        - ".amazonaws.com"
        - "api.anthropic.com"
        - ".npmjs.org"
      allowedHosts: []

  sidecars:
    tracing:
      enabled: false
      image: km-tracing:latest

  notification:
    h1:
      inbound:
        enabled: true
    email:
      enabled: true

