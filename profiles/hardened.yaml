apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: hardened
  labels:
    tier: production
    security: hardened

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "1h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.small
    region: us-east-1
    rootVolumeSize: 15
    hibernation: true
    additionalVolume:
      size: 20
      mountPoint: /data

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist

  network:
    enforcement: both
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
      allowedHosts: []

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network
    learnMode: false
    claudeTelemetry:
      enabled: true
      logPrompts: false
      logToolDetails: false

  email:
    signing: required
    verifyInbound: required
    encryption: required
    allowedSenders:
      - "self"

  agent:
    maxConcurrentTasks: 2
    taskTimeout: "30m"
    allowedTools:
      - read_file
