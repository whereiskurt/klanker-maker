apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: claude-dev
  labels:
    tier: development
    tool: claude-code
    builtin: "true"
  prefix: claude

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "30m"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.large
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: true
    env:
      SANDBOX_MODE: claude-dev
    rsyncPaths:
      - ".claude"
      - ".claude.json"
      - ".bashrc"
      - ".bash_profile"
      - ".gitconfig"
    initCommands:
      - "yum install -y git nodejs npm jq tar gzip unzip"
      - "npm install -g @anthropic-ai/claude-code"
      - "mkdir -p /workspace && chown -R sandbox:sandbox /workspace /home/sandbox"
      - "su - sandbox -c 'cd /workspace && git config --global user.name \"Claude Sandbox\" && git config --global user.email \"sandbox@klankermaker.ai\"'"

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "whereiskurt/meshtk"
        - "whereiskurt/defcon.run.34"
      allowedRefs:
        - "main"
        - "develop"
        - "feature/*"
        - "fix/*"

  network:
    egress:
      # GitHub hosts (github.com, api.github.com, *.githubusercontent.com) are
      # implicitly allowed by the HTTP proxy when sourceAccess.github.allowedRepos
      # is configured — no need to list them here. The proxy enforces repo-level
      # filtering via MITM, blocking access to repos not in the allowlist.
      allowedDNSSuffixes:
        - ".amazonaws.com"
        # Anthropic / Claude Code
        - ".anthropic.com"
        - ".claude.ai"
        - ".claude.com"
        # GitHub
        - ".github.com"
        - ".githubusercontent.com"
        # npm / Node.js
        - ".npmjs.org"
        - ".npmjs.com"
        - ".nodejs.org"
        - ".npmmirror.com"
        # Google / CDN / error reporting
        - ".googleapis.com"
        - ".google.com"
        - ".sentry.io"
        - ".cloudfront.net"
      allowedHosts:
        - ".amazonaws.com"
        - "github.com"
        # Anthropic / Claude Code
        - "api.anthropic.com"
        - "statsig.anthropic.com"
        - "statsig.com"
        - "api.statsig.com"
        - "featuregates.org"
        - "api.featuregates.org"
        - "mcp-proxy.anthropic.com"
        - "platform.claude.com"
        - "api.claude.ai"
        - "claude.ai"
        - "sentry.io"
        - "registry.npmjs.org"
        - "nodejs.org"
        - "google.com"
        - "www.google.com"

  budget:
    compute:
      maxSpendUSD: 2.00
    ai:
      maxSpendUSD: 5.00
    warningThreshold: 0.80

  artifacts:
    paths:
      - /workspace
    maxSizeMB: 1000

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network
    claudeTelemetry:
      enabled: true
      logPrompts: true
      logToolDetails: true

  email:
    signing: required
    verifyInbound: required
    encryption: off
    allowedSenders:
      - "self"

  agent:
    maxConcurrentTasks: 2
    taskTimeout: "60m"
    allowedTools:
      - bash
      - read_file
      - write_file
      - list_files
