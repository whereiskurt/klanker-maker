apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: desktop
  labels:
    tier: development
    tool: browser-desktop
  prefix: desk

extends:
  - base/os/debian
  - base/userinit
  - base/platform
  - base/slack-persandbox

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "30m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    instanceType: t3.large
    region: us-east-1
    rootVolumeSize: 30
    spot: false
    hibernation: false

    desktop:
      enabled: true
      mode: kiosk
      browsers:
        - firefox
      geometry: 1920x1080

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false
    privileged: false

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos: []
      allowedRefs: []

  network:
    enforcement: proxy
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - "time.aws.com"
        - ".anthropic.com"
        - ".claude.ai"
        - ".claude.com"
        - ".mozilla.org"
        - ".mozilla.com"
        - ".mozilla.net"
        - ".firefox.com"
      allowedHosts: []

  notification:
    events:
      onIdle: false
      onPermission: false
    email:
      enabled: true
