apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: learner
  labels:
    tier: development
    tool: learning-sandbox-unsafe
  prefix: learn

extends:
  - base/os/redhat
  - base/network/safenetwork
  - base/userinit
  - base/platform
  - base/slack-persandbox

spec:
  observability:
    learnMode: true

  lifecycle:
    ttl: "8h"
    idleTimeout: "1h"
    teardownPolicy: stop

  # Override base/platform's $2/$0.50 defaults. This install runs Claude via a
  # Max (subscription) OAuth login, not metered -p API keys, so AI "spend" is
  # notional — maxSpendUSD:0 disables AI suspension entirely (limit<=0 = no cap
  # in the budget-enforcer). Compute stays capped ($10 ~= 30h of t3.2xlarge) so
  # a forgotten box still has a real-money circuit breaker beyond TTL/idle.
  budget:
    ai:
      maxSpendUSD: 0
    compute:
      maxSpendUSD: 10.00

  runtime:
    substrate: ec2
    instanceType: t3.2xlarge
    region: us-east-1
    rootVolumeSize: 80
    spot: false
    hibernation: false
    mountEFS: true
    efsMountPoint: /shared
    additionalVolume:
      size: 30
      mountPoint: /data

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false
    privileged: true
    env:
      SANDBOX_MODE: learn-v2-direct-api

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "*"
      allowedRefs:
        - "*"

  cli:
    noBedrock: true

  agent:
    default: claude

  notification:
    github:
      inbound:
        enabled: true
    events:
      onIdle: false
      onPermission: false
    email:
      enabled: false
