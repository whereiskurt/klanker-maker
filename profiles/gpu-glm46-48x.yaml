apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: gpu-glm46-48x
  labels:
    tier: gpu-serving
    model: glm4.6-awq
    instance: g6e.48xlarge

extends:
  - base/os/debian
  - base/network/safenetwork
  - base/userinit
  - base/platform
  - base/slack-persandbox
  - base/gpu/serve

spec:
  # Bool zero-value trap (Phase 117 Pitfall 2): mixed-bool runtime block in the LEAF.
  runtime:
    instanceType: g6e.48xlarge
    region: us-east-1
    spot: false
    hibernation: false

  budget:
    compute:
      maxSpendUSD: 300   # 48x override (g6e.48xlarge: 8x L40S, ~$32/hr)

  execution:
    # GLM-4.6 (355B MoE): AWQ 4-bit, tp=8, ~178GB weights fit 8x L40S (384GB).
    # --trust-remote-code: required for GLM arch in vLLM.
    # --reasoning-parser glm45: GLM-4.6 emits thinking tags; additive+harmless.
    # vllm.env must exist BEFORE base/gpu/serve's bring-up (initCommandsAppend),
    # so write it via initCommands (runs before all initCommandsAppend).
    initCommands:
      - "mkdir -p /etc/km && printf 'VLLM_MODEL=QuantTrio/GLM-4.6-AWQ\nVLLM_TP=8\nVLLM_EXTRA=--quantization awq --max-model-len 65536 --gpu-memory-utilization 0.90 --trust-remote-code --enable-auto-tool-choice --tool-call-parser glm45 --reasoning-parser glm45\n' > /etc/km/vllm.env"
