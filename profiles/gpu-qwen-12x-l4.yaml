apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: gpu-qwen-12x-l4
  labels:
    tier: gpu-serving
    model: qwen2.5-72b-awq
    instance: g6.12xlarge
  # L4 capacity-fallback variant of gpu-qwen-12x: when the L40S fleet (g6e) is
  # capacity-dry in us-east-1, g6.12xlarge (4x L4 = 96GB VRAM, 48 vCPU) can still
  # serve Qwen2.5-72B-AWQ via TP=4 (~40GB weights fit in 96GB). L4 is slower than
  # L40S, so decode is sluggish but functional — fine for an E2E demo. max-model-len
  # trimmed to 16384 to keep KV-cache headroom comfortable on 24GB-per-GPU L4s.

extends:
  - base/os/debian
  - base/network/safenetwork
  - base/userinit
  - base/platform
  - base/slack-persandbox
  - base/gpu/serve

spec:
  secrets:
    sopsFile: ./secrets/qwen.enc.yaml

  # Bool zero-value trap (Phase 117 Pitfall 2): mixed-bool runtime block in the LEAF.
  runtime:
    instanceType: g6.12xlarge
    region: us-east-1
    spot: false
    hibernation: false

  execution:
    initCommands:
      - "mkdir -p /etc/km && printf 'VLLM_MODEL=Qwen/Qwen2.5-72B-Instruct-AWQ\nVLLM_TP=4\nVLLM_EXTRA=--quantization awq --max-model-len 16384 --gpu-memory-utilization 0.90 --enable-auto-tool-choice --tool-call-parser hermes\n' > /etc/km/vllm.env"
