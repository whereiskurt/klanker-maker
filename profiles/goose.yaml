apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: goose
  labels:
    tier: development
    tool: goose
    builtin: "true"
  prefix: goose
  alias: goose

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "30m"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace
    env:
      SANDBOX_MODE: goose
      # Goose config — provider name is "aws_bedrock" (not "amazon_bedrock")
      GOOSE_PROVIDER: aws_bedrock
      GOOSE_MODEL: anthropic.claude-opus-4-6-v1
      AWS_DEFAULT_REGION: us-east-1
      GOOSE_MODE: auto
      # Disable telemetry prompt on first run (non-interactive)
      GOOSE_TELEMETRY_ENABLED: "false"
      # NOTE: The sandbox bootstrap sets OTEL_EXPORTER_OTLP_PROTOCOL=grpc for Claude Code.
      # Goose's Rust OTLP exporter panics on grpc (it uses HTTP client internally).
      # The goose wrapper script in initCommands overrides this to http/protobuf for goose.
      # Rust binaries (goose, codex) need explicit CA cert path for MITM proxy TLS
      SSL_CERT_FILE: /usr/local/share/ca-certificates/km-proxy-ca.crt
      CODEX_CA_CERTIFICATE: /usr/local/share/ca-certificates/km-proxy-ca.crt
      # Claude Code via Bedrock
      ANTHROPIC_BASE_URL: "https://bedrock-runtime.us-east-1.amazonaws.com"
      ANTHROPIC_DEFAULT_SONNET_MODEL: us.anthropic.claude-sonnet-4-6
      ANTHROPIC_DEFAULT_OPUS_MODEL: us.anthropic.claude-opus-4-6-v1
      ANTHROPIC_DEFAULT_HAIKU_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
      CLAUDE_CODE_USE_BEDROCK: "1"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      # Codex — OPENAI_API_KEY must be injected via SSM at runtime
      OPENAI_API_KEY: ""
    rsyncPaths:
      - ".gitconfig"
      - ".config/goose"
      - ".claude"
      - ".claude.json"
      - ".codex"
    initCommands:
      - "yum install -y git nodejs npm python3 python3-pip bzip2 jq tar gzip unzip"
      - "HOME=/root curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | HOME=/root CONFIGURE=false bash"
      - "cp -r /root/.local/bin/goose /usr/local/bin/goose-bin || true"
      - "printf '#!/bin/bash\\nexport OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf\\nexec /usr/local/bin/goose-bin \"$@\"\\n' > /usr/local/bin/goose && chmod +x /usr/local/bin/goose"
      - "mkdir -p /home/sandbox/.local/bin && cp /usr/local/bin/goose /home/sandbox/.local/bin/goose || true"
      - "npm install -g @anthropic-ai/claude-code"
      - "curl -fsSL https://github.com/openai/codex/releases/download/rust-v0.117.0/codex-x86_64-unknown-linux-musl.tar.gz -o /tmp/codex.tar.gz"
      - "tar -xzf /tmp/codex.tar.gz -C /tmp && install -m 755 /tmp/codex-x86_64-unknown-linux-musl /usr/local/bin/codex"
      - "mkdir -p /home/sandbox/.config/goose /home/sandbox/.codex"
      - "printf 'provider: aws_bedrock\\nmodel: anthropic.claude-opus-4-6-v1\\n' > /home/sandbox/.config/goose/config.yaml"
      - "mkdir -p /workspace && chown -R sandbox:sandbox /workspace /home/sandbox/.config /home/sandbox/.local /home/sandbox/.codex"
      - "su - sandbox -c 'cd /workspace && git config --global user.name \"Goose Sandbox\" && git config --global user.email \"sandbox@klankermaker.ai\"'"

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "whereiskurt/meshtk"
        - "whereiskurt/defcon.run.34"
      allowedRefs:
        - "main"
        - "develop"
        - "feature/*"
        - "fix/*"
      permissions:
        - read
        - write

  network:
    egress:
      # GitHub hosts are implicitly allowed via sourceAccess.github.allowedRepos
      allowedDNSSuffixes:
        - ".amazonaws.com"
        # Anthropic / Claude Code
        - ".anthropic.com"
        - ".claude.ai"
        - ".claude.com"
        - ".sentry.io"
        - ".cloudfront.net"
        # GitHub
        - ".github.com"
        - ".githubusercontent.com"
        # npm / Node.js (for claude-code, extensions via npx)
        - ".npmjs.org"
        - ".npmjs.com"
        - ".nodejs.org"
        - ".npmmirror.com"
        # OpenAI (codex)
        - ".openai.com"
        # Python (goose extensions via uvx)
        - ".pypi.org"
        - ".pythonhosted.org"
        # Goose extensions / MCP
        - ".pulsemcp.com"
        # Google (goose telemetry, search)
        - ".google.com"
        - ".google-analytics.com"
        - ".googletagmanager.com"
      allowedHosts:
        - "github.com"
        # Anthropic / Claude Code
        - "api.anthropic.com"
        - "statsig.anthropic.com"
        - "statsig.com"
        - "api.statsig.com"
        - "featuregates.org"
        - "api.featuregates.org"
        - "mcp-proxy.anthropic.com"
        - "platform.claude.com"
        - "api.claude.ai"
        - "claude.ai"
        - "sentry.io"
        # npm
        - "registry.npmjs.org"
        - "nodejs.org"
        # OpenAI (codex)
        - "api.openai.com"
        # Python (goose extensions)
        - "pypi.org"
        - "files.pythonhosted.org"
        # Goose MCP extension directory
        - "pulsemcp.com"
        # Google
        - "google.com"
        - "www.google.com"
        - "www.google-analytics.com"
        - "www.googletagmanager.com"
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE

  budget:
    compute:
      maxSpendUSD: 2.00
    ai:
      maxSpendUSD: 5.00
    warningThreshold: 0.80

  artifacts:
    paths:
      - /workspace
    maxSizeMB: 1000

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network
    claudeTelemetry:
      enabled: true
      logPrompts: true
      logToolDetails: true

  policy:
    allowShellEscape: false
    allowedCommands:
      - git
      - goose
      - claude
      - codex
      - node
      - npm
      - npx
      - python3
      - pip
      - uvx
      - bash
      - sh
      - jq
      - curl
    filesystemPolicy:
      readOnlyPaths: []
      writablePaths:
        - /workspace
        - /tmp
        - /home

  email:
    signing: required
    verifyInbound: required
    encryption: off
    allowedSenders:
      - "self"

  agent:
    maxConcurrentTasks: 1
    taskTimeout: "60m"
    allowedTools:
      - bash
      - read_file
      - write_file
      - list_files
