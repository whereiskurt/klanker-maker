# Example SOPS secret bundle — REFERENCE ONLY, do not encrypt this file.
#
# Copy the values you need to /tmp/<name>.yaml, replace REPLACE-ME with real
# secrets, then encrypt:
#
#   KMS_ARN=$(aws kms list-aliases --region us-east-1 \
#     --query "Aliases[?AliasName=='alias/$(yq -r .resource_prefix km-config.yaml)-sandbox-secrets'].AliasArn" \
#     --output text)
#
#   sops --encrypt --kms "$KMS_ARN" \
#        --input-type yaml --output-type yaml \
#        /tmp/<name>.yaml > profiles/secrets/<name>.enc.yaml
#
#   rm /tmp/<name>.yaml
#
# Then reference from a profile: `spec.secrets.sopsFile: ./secrets/<name>.enc.yaml`
# Each top-level key becomes an environment variable in every login shell
# inside the sandbox.

# OpenAI direct API — Codex CLI + raw OpenAI SDK.
# Metered by the http-proxy at api.openai.com when spec.cli.agent: codex.
OPENAI_API_KEY: sk-proj-REPLACE-ME

# Anthropic direct API — Claude Code when spec.execution.useBedrock: false.
# (Bedrock-mode sandboxes use IAM and do NOT need this.)
ANTHROPIC_API_KEY: sk-ant-REPLACE-ME

# GitHub personal access token — private-repo clones, gh CLI auth, etc.
# Scope to the minimum required (typically `repo` + `read:org`).
GITHUB_TOKEN: ghp_REPLACE-ME

# Custom — any sandbox-side tool that reads its config from env vars.
# Add as many KEY: VALUE pairs as needed; quoting follows YAML rules.
MY_INTERNAL_API_TOKEN: REPLACE-ME-OPAQUE-STRING
MY_SERVICE_DATABASE_URL: postgres://user:password@host:5432/dbname
