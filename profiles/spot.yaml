apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: spot
  labels:
    tier: development
    tool: spot-demo
  prefix: spot

extends:
  - base/os/redhat
  - base/userinit
  - base/platform
  - base/slack-persandbox

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "30m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    instanceType: t3.large
    region: us-east-1
    rootVolumeSize: 30
    spot: true
    hibernation: false

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "whereiskurt/*"
      allowedRefs:
        - "*"

  network:
    enforcement: proxy
    egress:
      allowedDNSSuffixes:
        - ".github.com"
        - ".githubusercontent.com"
        - ".amazonaws.com"
        - "api.anthropic.com"
        - ".npmjs.org"
      allowedHosts: []

  cli:
    noBedrock: true

  agent:
    default: claude

  notification:
    email:
      enabled: true
