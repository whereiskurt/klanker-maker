apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: gpu-qwen-12x
  labels:
    tier: gpu-serving
    model: qwen2.5-72b-awq
    instance: g6e.12xlarge

extends:
  - base/os/debian
  - base/network/safenetwork
  - base/userinit
  - base/platform
  - base/slack-persandbox
  - base/gpu/serve

spec:
  # Bool zero-value trap (Phase 117 Pitfall 2): mixed-bool runtime block in the LEAF.
  runtime:
    instanceType: g6e.12xlarge
    region: us-east-1
    spot: false
    hibernation: false

  execution:
    # Write /etc/km/vllm.env via initCommandsAppend (NOT configFiles) — configFiles
    # section (7.6) runs AFTER initCommands, so appending HF_TOKEN from initCommandsAppend
    # would race. Writing the env here keeps ordering unambiguous for all leaves.
    # vllm.env must exist BEFORE base/gpu/serve's bring-up (initCommandsAppend),
    # so write it via initCommands (runs before all initCommandsAppend).
    initCommands:
      - "mkdir -p /etc/km && printf 'VLLM_MODEL=Qwen/Qwen2.5-72B-Instruct-AWQ\nVLLM_TP=4\nVLLM_EXTRA=--quantization awq --max-model-len 32768 --gpu-memory-utilization 0.90 --enable-auto-tool-choice --tool-call-parser hermes\n' > /etc/km/vllm.env"
