apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: github
  labels:
    tier: development
    tool: github-review-agent
  prefix: gh

extends:
  - base/os/redhat
  - base/network/safenetwork
  - base/userinit
  - base/platform
  - base/slack-persandbox

spec:
  lifecycle:
    ttl: "2h"
    idleTimeout: "20m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    instanceType: t3.medium
    region: us-east-1
    spot: false

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "*"
      allowedRefs:
        - "*"

  notification:
    github:
      inbound:
        enabled: true
    email:
      enabled: true

