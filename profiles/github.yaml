apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: github
  labels:
    tier: development
    tool: github-review-agent
  prefix: gh

# Secrets: SOPS-encrypted bundle for cold-box self-authentication (Phase 98-04).
# See docs/sandbox-secrets.md (Phase 89) for the full SOPS injection runbook:
#   km bootstrap --shared-secrets-key   # one-time
#   sops --encrypt --kms <arn> github-review-secrets.enc.yaml
#   km init --dry-run=false

extends:
  - base/os/redhat
  - base/userinit
  - base/platform
  - base/slack-persandbox

spec:
  lifecycle:
    ttl: "2h"
    idleTimeout: "20m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    instanceType: t3.medium
    region: us-east-1
    # Bool fields IN-LEAF (bool zero-value trap — do not move to a fragment).
    # On-demand (spot:false) for predictable bridge availability — no interruption
    # mid-review. The dedicated spot demo lives in profiles/spot.yaml.
    spot: false

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "whereiskurt/*"
      allowedRefs:
        - "main"
        - "develop"
        - "*"

  network:
    # Narrow in-leaf allowlist (NOT base/safenetwork — list union would widen to "*").
    enforcement: proxy
    egress:
      allowedDNSSuffixes:
        - ".github.com"
        - ".githubusercontent.com"
        - ".amazonaws.com"
        - "api.anthropic.com"
        - ".npmjs.org"
      allowedHosts: []

  notification:
    github:
      inbound:
        enabled: true
    # email on so Rule S5 (both channels off) cannot fire.
    email:
      enabled: true

