apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: github
  labels:
    tier: development
    tool: github-review-agent
  prefix: gh

# github — Phase 120 composed leaf. Replaces profiles/github-review.yaml.
#
# GitHub comment-trigger code review sandbox. When an allowlisted GitHub login
# @-mentions the bot in a PR comment, the km-github-bridge Lambda dispatches an
# agent turn to this sandbox (warm: FIFO enqueue; cold: EventBridge SandboxCreate).
# The agent reads the PR diff and posts a review via `km-github review`.
#
# Lifecycle: short-lived (2h TTL / 20m idle), teardownPolicy=stop preserves the DDB
# record for status queries after the EC2 instance stops.
#
# extends ordering: base/os/redhat FIRST so OS yum+cert initCommands precede toolchain.
# Full toolchain (goose/codex/nvm/gsd/herdr) via base/toolchain-agents — heavier than
# the legacy github-review.yaml (which installed only yum+claude-code), but the
# single version-pin site is the design point: update one file to roll all agents.
#
# Network: narrow allowlist kept in-leaf (NOT base/safenetwork — list union would
# widen to "*" and defeat the tightened github posture).
#
# Notification: notification.github.inbound.enabled:true (provisions the per-sandbox
# github-inbound FIFO queue) AND base/slack-persandbox (per-sandbox #sb-github-{alias}
# channel + transcript streaming + whereiskurt@gmail.com invite). email.enabled:true
# is kept too, so the operator gets both Slack and email notifications.
#
# Bool runtime fields (spot) STAY IN THIS LEAF — not inherited —
# to avoid the bool zero-value trap (Phase 117 § bool zero-value trap).
#
# Secrets: SOPS-encrypted bundle for cold-box self-authentication (Phase 98-04).
# See docs/sandbox-secrets.md (Phase 89) for the full SOPS injection runbook:
#   km bootstrap --shared-secrets-key   # one-time
#   sops --encrypt --kms <arn> github-review-secrets.enc.yaml
#   km init --dry-run=false

extends:
  - base/os/redhat
  - base/toolchain-agents
  - base/plugin-klanker
  - base/sidecars-all
  - base/observability-learn
  - base/budget-standard
  - base/artifacts-workspace
  - base/iam-us-east-1
  - base/agent-claude-all-tools
  - base/slack-persandbox

spec:
  lifecycle:
    ttl: "2h"
    idleTimeout: "20m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    instanceType: t3.medium
    region: us-east-1
    # Bool fields IN-LEAF (bool zero-value trap — do not move to a fragment).
    # On-demand (spot:false) for predictable bridge availability — no interruption
    # mid-review. The dedicated spot demo lives in profiles/spot.yaml.
    spot: false

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "whereiskurt/*"
      allowedRefs:
        - "main"
        - "develop"
        - "*"

  network:
    # Narrow in-leaf allowlist (NOT base/safenetwork — list union would widen to "*").
    enforcement: proxy
    egress:
      allowedDNSSuffixes:
        - ".github.com"
        - ".githubusercontent.com"
        - ".amazonaws.com"
        - "api.anthropic.com"
        - ".npmjs.org"
      allowedHosts: []

  notification:
    github:
      inbound:
        enabled: true
    # email on so Rule S5 (both channels off) cannot fire.
    email:
      enabled: true

