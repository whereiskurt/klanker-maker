apiVersion: klankermaker.ai/v1alpha1
kind: SandboxProfile
metadata:
  name: open-dev
  labels:
    tier: development
    builtin: "true"

spec:
  lifecycle:
    ttl: "24h"
    idleTimeout: "4h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace
    env:
      SANDBOX_MODE: open-dev

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "github.com/*"
      allowedRefs:
        - "main"
        - "develop"
        - "feature/*"
        - "fix/*"
      permissions:
        - read
        - write

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - ".github.com"
        - ".githubusercontent.com"
        - ".npmjs.org"
        - ".pypi.org"
        - ".golang.org"
        - ".docker.io"
        - ".registry.hub.docker.com"
      allowedHosts:
        - "api.github.com"
        - "github.com"
        - "registry.npmjs.org"
        - "pypi.org"
        - "pkg.go.dev"
        - "sum.golang.org"
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE

  identity:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
      - us-west-2
    sessionPolicy: minimal

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network

  policy:
    allowShellEscape: false
    allowedCommands:
      - git
      - python3
      - pip
      - node
      - npm
      - go
      - bash
      - sh
    filesystemPolicy:
      readOnlyPaths: []
      writablePaths:
        - /workspace
        - /tmp
        - /home

  email:
    signing: optional
    verifyInbound: optional
    encryption: off
    allowedSenders:
      - "*"

  agent:
    maxConcurrentTasks: 4
    taskTimeout: "30m"
    allowedTools:
      - bash
      - read_file
      - write_file
      - list_files
