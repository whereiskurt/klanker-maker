{{define "secret_row"}}
<tr class="table-row secret-row" data-name="{{.Name}}">
  <td class="cell-id" title="{{.Name}}">{{.Name}}</td>
  <td>
    {{if eq .Type "SecureString"}}
      <span class="badge badge-securestring">SecureString</span>
    {{else}}
      <span class="badge badge-string">String</span>
    {{end}}
  </td>
  <td>{{.LastModified}}</td>
  <td>{{.Version}}</td>
  <td class="secret-value-cell">
    <span class="secret-value">***</span>
    <button class="btn btn-secondary btn-sm"
      hx-get="/api/secrets{{.Name}}"
      hx-target="closest .secret-value-cell"
      hx-swap="innerHTML"
      type="button">
      Reveal
    </button>
  </td>
  <td class="actions-cell">
    <button class="btn btn-secondary btn-sm" type="button"
      onclick="toggleEditForm(this, '{{.Name}}')"
      title="Edit secret value">
      Edit
    </button>
    <button class="btn btn-danger btn-sm"
      hx-delete="/api/secrets{{.Name}}"
      hx-confirm="Delete parameter {{.Name}}?"
      hx-target="closest tr"
      hx-swap="outerHTML swap:1s"
      type="button"
      title="Delete secret">
      Delete
    </button>
    <!-- Inline edit form (hidden by default) -->
    <div class="secret-edit-form hidden" style="margin-top:0.5rem">
      <textarea class="input" rows="2" placeholder="New value" style="width:100%"></textarea>
      <div style="display:flex;gap:0.25rem;margin-top:0.25rem">
        <button class="btn btn-primary btn-sm" type="button"
          onclick="saveSecret(this, '{{.Name}}')" title="Save">Save</button>
        <button class="btn btn-secondary btn-sm" type="button"
          onclick="toggleEditForm(this.closest('.actions-cell').querySelector('button'), '{{.Name}}')"
          title="Cancel">Cancel</button>
      </div>
    </div>
  </td>
</tr>
{{end}}

{{define "secret_rows"}}
{{if .}}
  {{range .}}{{template "secret_row" .}}{{end}}
{{else}}
  <tr class="empty-state">
    <td colspan="6">No SSM parameters found under /km/.</td>
  </tr>
{{end}}
{{end}}
