apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: hardened
  labels:
    tier: production
    security: hardened

spec:
  lifecycle:
    ttl: "4h"
    idleTimeout: "1h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.small
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
      allowedHosts:
        - "sts.us-east-1.amazonaws.com"
        - "ssm.us-east-1.amazonaws.com"

  iam:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klanker-maker/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klanker-maker/network
    claudeTelemetry:
      enabled: true
      logPrompts: false
      logToolDetails: false
    tlsCapture:
      enabled: true
      libraries:
        - openssl
      capturePayloads: false
