apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: learn-polite
  labels:
    tier: development
    tool: learning-sandbox-unsafe
    phase91: mode2-force-polite
  prefix: learnpolite

extends:
  - base/safenetwork
  - base/sidecars-all
  - base/observability-learn
  - base/budget-standard
  - base/artifacts-workspace
  - base/iam-us-east-1
  - base/agent-claude-all-tools
  - base/email-strict

spec:
  lifecycle:
    ttl: "8h"
    idleTimeout: "1h"
    teardownPolicy: stop

  runtime:
    ami: amazon-linux-2023
    substrate: ec2
    instanceType: t3.2xlarge
    region: us-east-1

    ##spot:true means hibernate must be false
    spot: false
    ## hibernation true means on stop memory is written to the root disk.
    hibernation: false
    rootVolumeSize: 80

    ## Unlimited filesystem locked to the region
    mountEFS: true
    efsMountPoint: /shared

    ## Separate attached EBS
    additionalVolume:
      size: 30
      mountPoint: /data

  execution:
    shell: /bin/bash
    workingDir: /workspace

    ## This determines if instance profile can access bedrock
    useBedrock: false

    privileged: true
    env:
      SANDBOX_MODE: learn-v2-direct-api
      GOOSE_MODE: auto
      GOOSE_TELEMETRY_ENABLED: "false"
      CODEX_CA_CERTIFICATE: /usr/local/share/ca-certificates/km-proxy-ca.crt
      OPENAI_API_KEY: ""
    configFiles:
      "/home/sandbox/.claude/plugins/known_marketplaces.json": |
        {"klanker-maker":{"source":{"source":"github","repo":"whereiskurt/klanker-maker"},"installLocation":"/home/sandbox/.claude/plugins/marketplaces/klanker-maker","lastUpdated":"2026-04-16T00:00:00Z"}}
      # Enable the installed klanker plugin so its skills (klanker:slack, etc.) are
      # available to headless `claude -p` (km agent run / km at agent run). Without
      # this, the plugin is installed but not enabled and the skills never load.
      # Deep-merged on top of the synthesized settings.json (Phase 92).
      "/home/sandbox/.claude/settings.json": |
        {"enabledPlugins": {"klanker@klanker-maker": true}}

    # For plugin-only snapshots, use rsyncPaths: [".claude/plugins"] in your profile
    rsyncPaths:
      - ".gitconfig"
      - ".config/goose"
      - ".claude"
      - ".claude.json"
      - ".codex"
    initCommands:
      - "yum install -y git nodejs npm python3 python3-pip bzip2 jq tar gzip unzip tmux cronie"
      - "systemctl enable crond; systemctl start crond"
      - "HOME=/root curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | HOME=/root CONFIGURE=false bash"
      - "cp -r /root/.local/bin/goose /usr/local/bin/goose-bin || true"
      - "printf 'export OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf\\nexport OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318\\n' > /etc/profile.d/km-zz-goose-otel.sh"
      - "cat /usr/local/share/ca-certificates/km-proxy-ca.crt >> /etc/pki/tls/certs/ca-bundle.crt"
      - "echo export SSL_CERT_FILE=/etc/pki/tls/certs/ca-bundle.crt >> /etc/profile.d/km-zz-goose-otel.sh"
      - "mkdir -p /home/sandbox/.local/bin && cp /usr/local/bin/goose-bin /usr/local/bin/goose && cp /usr/local/bin/goose /home/sandbox/.local/bin/goose || true"
      - "npm install -g @anthropic-ai/claude-code@2.1.132"
      - "curl -fsSL https://github.com/openai/codex/releases/download/rust-v0.133.0/codex-x86_64-unknown-linux-musl.tar.gz -o /tmp/codex.tar.gz"
      - "tar -xzf /tmp/codex.tar.gz -C /tmp && install -m 755 /tmp/codex-x86_64-unknown-linux-musl /usr/local/bin/codex"
      - "mkdir -p /home/sandbox/.config/goose /home/sandbox/.codex && chown -R sandbox:sandbox /home/sandbox/.codex"
      - "mkdir -p /workspace && chown -R sandbox:sandbox /workspace /home/sandbox/.config /home/sandbox/.local"
      - "su - sandbox -c 'cd /workspace && git config --global user.name \"Learner Sandbox\" && git config --global user.email \"sandbox@klankermaker.ai\"'"
      - "git clone --depth 1 https://github.com/whereiskurt/klanker-maker.git /home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0 2>/dev/null && mkdir -p /home/sandbox/.claude/plugins/marketplaces && ln -sfn /home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0 /home/sandbox/.claude/plugins/marketplaces/klanker-maker && KM_SHA=$(git -C /home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0 rev-parse HEAD) && KM_NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z) && printf '{\"version\":2,\"plugins\":{\"klanker@klanker-maker\":[{\"scope\":\"user\",\"installPath\":\"/home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0\",\"version\":\"0.1.0\",\"installedAt\":\"%s\",\"lastUpdated\":\"%s\",\"gitCommitSha\":\"%s\"}]}}' \"$KM_NOW\" \"$KM_NOW\" \"$KM_SHA\" > /home/sandbox/.claude/plugins/installed_plugins.json && chown -R sandbox:sandbox /home/sandbox/.claude/plugins || true"
      - "su - sandbox -c 'cd /workspace && curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash'"
      - "su - sandbox -c 'nvm install 22'"
      - "su - sandbox -c 'npx -y get-shit-done-cc --claude --codex --global'"

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "*"
      allowedRefs:
        - "*"

  cli:
    ##Setting noBedrock calls the noBedrock() bash function call on loading and prevents accidentally Bedrock
    noBedrock: true

  # Phase 92 (Wave 4) — agent/claudeArgs/codexArgs moved out of spec.cli into the
  # structured spec.agent block. tools.* is populated in Wave 5.
  agent:
    default: claude

  # Phase 92 — notify* fields moved out of spec.cli into spec.notification.
  notification:
    events:
      onIdle: false
      onPermission: false
    email:
      enabled: false
    slack:
      enabled: true
      perSandbox: true
      # Channel named after the profile, unique per sandbox (keeps inbound 1:1
      # routing + archive-on-destroy). {profile}=metadata.name, {alias}=--alias
      # (falls back to sandbox id). Omit for the default #sb-{alias}.
      channelName: "sb-{profile}-{alias}"
      archiveOnDestroy: false
      inbound:
        enabled: true
        # Phase 91 — Mode 2 (per-sandbox #sb-{id}) operator override: force polite.
        # Mode 2 default is `false` (chatty, every-message). Setting `true` here
        # makes the bot only react when the message contains <@{bot_user_id}>,
        # identical to shared-channel behaviour.
        # NOTE: install-level KM_SLACK_MENTION_ONLY env var gates this at the
        # Lambda level. Set KM_SLACK_MENTION_ONLY=true before `km init --sidecars`
        # for the deployed bridge to honour polite mode. Per-sandbox routing of
        # the flag is deferred (see 91-RESEARCH.md Open Question #1).
        mentionOnly: true
        # Phase 91.4 — first-only reactor. When false, the 👀 reaction posts only
        # on top-level engagement messages; thread replies dispatch silently.
        # Set true (default, current behaviour) to react on every dispatched
        # message. Install-level toggle lives in km-config.yaml as slack.react_always.
        reactAlways: false
      # Phase 72 — operator invite list. invites.useConnect: false to fail-soft
      # skip any external addresses (avoids generating Slack Connect requests
      # in testing). whereiskurt@gmail.com only.
      invites:
        useConnect: false
        emails:
          - whereiskurt@gmail.com
