apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: open-dev
  labels:
    tier: development
    team: platform

spec:
  lifecycle:
    ttl: "24h"
    idleTimeout: "2h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace
    env:
      SANDBOX_MODE: open-dev

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "github.com/whereiskurt/*"
      allowedRefs:
        - "main"
        - "develop"

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - ".github.com"
        - ".pypi.org"
      allowedHosts:
        - "api.github.com"
        - "pypi.org"

  iam:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1
      - us-west-2

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klanker-maker/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klanker-maker/network
