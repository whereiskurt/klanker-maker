apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: multi-parent-child
  labels:
    origin: child
extends:
  - multi-parent-base-a
  - multi-parent-base-b

spec:
  lifecycle:
    ttl: "2h"
  execution:
    initCommands:
      - echo from-child
      - shared-cmd
  network:
    egress:
      allowedDNSSuffixes:
        - ".child.example.com"
        - ".shared.example.com"
