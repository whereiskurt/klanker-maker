apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: bad-substrate
  labels:
    tier: development

spec:
  lifecycle:
    ttl: "24h"
    idleTimeout: "2h"
    teardownPolicy: destroy

  runtime:
    substrate: kubernetes
    spot: false
    instanceType: t3.medium
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
      allowedHosts: []

  iam:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klanker-maker/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klanker-maker/network
