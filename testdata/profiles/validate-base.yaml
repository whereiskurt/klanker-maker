apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: validate-base
  abstract: true

# Abstract base fragment providing all required fields for leaf profile validation.
# Used by validate-leaf.yaml in TestValidateMultiParentLeaf.
spec:
  lifecycle:
    ttl: "8h"
    idleTimeout: "1h"
    teardownPolicy: destroy

  runtime:
    substrate: ec2
    spot: true
    instanceType: t3.small
    region: us-east-1

  execution:
    shell: /bin/bash
    workingDir: /workspace

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - "github.com/whereiskurt/*"
      allowedRefs:
        - "main"

  network:
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
      allowedHosts:
        - "api.github.com"

  iam:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    commandLog:
      destination: cloudwatch
      logGroup: /klanker-maker/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klanker-maker/network
