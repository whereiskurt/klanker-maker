apiVersion: klankermaker.ai/v1alpha2
kind: SandboxProfile
metadata:
  name: private-allow
  labels:
    tier: development
    tool: phase118-uat
    phase118: private-channel+trigger-allowlist
  prefix: privallow

spec:
  lifecycle:
    ttl: "2h"
    idleTimeout: "30m"
    teardownPolicy: stop

  runtime:
    substrate: ec2
    spot: false
    instanceType: t3.large
    region: us-east-1
    rootVolumeSize: 15
    hibernation: true
    ami: amazon-linux-2023
    mountEFS: true
    efsMountPoint: /shared
    additionalVolume:
      size: 20
      mountPoint: /data

  execution:
    shell: /bin/bash
    workingDir: /workspace
    useBedrock: false
    privileged: true
    env:
      SANDBOX_MODE: learn-v2-direct-api
    configFiles:
      "/home/sandbox/.claude/plugins/known_marketplaces.json": |
        {"klanker-maker":{"source":{"source":"github","repo":"whereiskurt/klanker-maker"},"installLocation":"/home/sandbox/.claude/plugins/marketplaces/klanker-maker","lastUpdated":"2026-04-16T00:00:00Z"}}
      "/home/sandbox/.claude/settings.json": |
        {"enabledPlugins": {"klanker@klanker-maker": true}}
    rsyncPaths:
      - ".gitconfig"
      - ".claude"
      - ".claude.json"
    initCommands:
      - "yum install -y git nodejs npm python3 python3-pip jq tar gzip unzip tmux cronie"
      - "systemctl enable crond; systemctl start crond"
      - "cat /usr/local/share/ca-certificates/km-proxy-ca.crt >> /etc/pki/tls/certs/ca-bundle.crt"
      - "mkdir -p /workspace && chown -R sandbox:sandbox /workspace /home/sandbox/.claude || true"
      - "su - sandbox -c 'cd /workspace && git config --global user.name \"UAT Sandbox\" && git config --global user.email \"sandbox@klankermaker.ai\"'"
      - "su - sandbox -c 'npm install -g @anthropic-ai/claude-code@2.1.132'"
      - "git clone --depth 1 https://github.com/whereiskurt/klanker-maker.git /home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0 2>/dev/null && mkdir -p /home/sandbox/.claude/plugins/marketplaces && ln -sfn /home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0 /home/sandbox/.claude/plugins/marketplaces/klanker-maker && KM_SHA=$(git -C /home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0 rev-parse HEAD) && KM_NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z) && printf '{\"version\":2,\"plugins\":{\"klanker@klanker-maker\":[{\"scope\":\"user\",\"installPath\":\"/home/sandbox/.claude/plugins/cache/klanker-maker/klanker/0.1.0\",\"version\":\"0.1.0\",\"installedAt\":\"%s\",\"lastUpdated\":\"%s\",\"gitCommitSha\":\"%s\"}]}}' \"$KM_NOW\" \"$KM_NOW\" \"$KM_SHA\" > /home/sandbox/.claude/plugins/installed_plugins.json && chown -R sandbox:sandbox /home/sandbox/.claude/plugins || true"

  sourceAccess:
    mode: allowlist
    github:
      allowedRepos:
        - whereiskurt/klanker-maker
      allowedRefs:
        - "*"

  network:
    enforcement: both
    egress:
      allowedDNSSuffixes:
        - ".amazonaws.com"
        - "time.aws.com"
        - ".anthropic.com"
        - ".claude.ai"
        - ".claude.com"
        - ".sentry.io"
        - ".cloudfront.net"
        - ".github.com"
        - ".githubusercontent.com"
        - ".npmjs.org"
        - ".npmjs.com"
        - ".nodejs.org"
      allowedHosts:
        - "nodejs.org"

  budget:
    compute:
      maxSpendUSD: 0.50
    ai:
      maxSpendUSD: 1.00
    warningThreshold: 0.80

  artifacts:
    paths:
      - /workspace
    maxSizeMB: 500

  iam:
    roleSessionDuration: "1h"
    allowedRegions:
      - us-east-1

  sidecars:
    dnsProxy:
      enabled: true
      image: km-dns-proxy:latest
    httpProxy:
      enabled: true
      image: km-http-proxy:latest
    auditLog:
      enabled: true
      image: km-audit-log:latest
    tracing:
      enabled: true
      image: km-tracing:latest

  observability:
    learnMode: false
    commandLog:
      destination: cloudwatch
      logGroup: /klankrmkr/sandboxes
    networkLog:
      destination: cloudwatch
      logGroup: /klankrmkr/network
    claudeTelemetry:
      enabled: true
      logPrompts: true
      logToolDetails: true

  email:
    signing: required
    verifyInbound: required
    encryption: required
    allowedSenders:
      - "*"

  cli:
    noBedrock: true

  agent:
    default: claude
    claude:
      trustedDirectories:
        - /home/sandbox
        - /workspace
      tools:
        autoApprove:
          - Bash
          - Read
          - Write
          - Edit
          - Glob
          - Grep
      args:
        - "--dangerously-skip-permissions"

  notification:
    events:
      onIdle: false
      onPermission: false
    email:
      enabled: false
    slack:
      enabled: true
      perSandbox: true
      # Phase 118 — create the per-sandbox channel as PRIVATE (is_private:true).
      private: true
      channelName: "sb-{profile}-{alias}"
      archiveOnDestroy: false
      inbound:
        enabled: true
        # Chatty (every message) so the allowlist is the sole trigger gate for the UAT.
        mentionOnly: false
        reactAlways: true
        # Phase 118 — per-sandbox trigger allowlist (REPLACES install-level for this sandbox).
        allow:
          - U0B0162H1GX
      invites:
        useConnect: false
        emails:
          - whereiskurt@gmail.com
