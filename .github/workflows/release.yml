name: release

on:
  push:
    tags:
      - 'v*'

# Allow only one release at a time so a fast follow-up tag can't race the first.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub releases + upload archives

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so goreleaser can build the changelog between tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache bundled tool downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/km-bundle
          key: km-bundle-tf-1.9.8-tg-0.99.1
          restore-keys: |
            km-bundle-

      # Inject the human-curated "Major additions highlighted" section into the
      # release notes. Loaded from docs/RELEASE-HIGHLIGHTS.md → env var →
      # .goreleaser.yaml `release.header` ({{ with index .Env "KM_RELEASE_HIGHLIGHTS" }}).
      # Update docs/RELEASE-HIGHLIGHTS.md before each tag; missing/empty file = section omitted.
      - name: Load release highlights
        run: |
          if [ -s docs/RELEASE-HIGHLIGHTS.md ]; then
            {
              echo 'KM_RELEASE_HIGHLIGHTS<<KM_HL_EOF'
              cat docs/RELEASE-HIGHLIGHTS.md
              echo 'KM_HL_EOF'
            } >> "$GITHUB_ENV"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
